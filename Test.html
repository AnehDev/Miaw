<meta charset="UTF-8">

<title>Checking...</title>

<script>
const api = "https://anehgmainginject.pages.dev/api/test";
const primary = "https://anehgmainginject.pages.dev/";
const backup = "https://test.com/";

async function detectFunction() {
    try {
        const controller = new AbortController();

        const timeout = setTimeout(() => {
            controller.abort();
        }, 4000);

        const res = await fetch(api, {
            method: "GET",
            cache: "no-store",
            signal: controller.signal
        });

        clearTimeout(timeout);

        // Cloudflare quota exceeded usually gives error codes
        if (res.ok) {
            window.location.href = primary;
        } else {
            window.location.href = backup;
        }

    } catch (err) {
        // timeout / fetch failed
        window.location.href = backup;
    }
}

detectFunction();
</script>
