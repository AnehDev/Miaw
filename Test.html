<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checking...</title>
</head>
<body>
<p id="status">Checking server...</p>

<script>
const mirrors = [
  {
    health: "https://anehgaminginjectoor.pages.dev/api/test",
    target: "https://anehgaminginjectoor.pages.dev/"
  },
  {
    health: "https://anehgmainginject.pages.dev/api/test",
    target: "https://anehgmainginject.pages.dev/"
  },
  { health: null, target: "https://your-backup.example/" }
];

const TIMEOUT_MS = 4000;

async function isAlive(url) {
  if (!url) return false;
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), TIMEOUT_MS);
    const res = await fetch(url, { method: "GET", cache: "no-store", signal: ctrl.signal });
    clearTimeout(t);
    return res.ok;
  } catch {
    return false;
  }
}

(async () => {
  for (const m of mirrors) {
    if (!m.health || await isAlive(m.health)) {
      window.location.replace(m.target);
      return;
    }
  }
})();
</script>
</body>
</html>
